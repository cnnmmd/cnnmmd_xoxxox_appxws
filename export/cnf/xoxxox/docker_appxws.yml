networks:
  default:
    name: xoxxox_netmid
    external: true
services:
  xoxxox_appxws:
    image: xoxxox/envxws:001
    container_name: xoxxox_appxws
    env_file:
      - ./envdir.txt
    volumes:
      - ../../../export:/opt/common
    ports:
      - 3389:3389
    command: bash -c "/usr/sbin/xrdp-sesman && /usr/sbin/xrdp && /env/python/bin/python /opt/common/bin/xoxxox/srvxws.py"
